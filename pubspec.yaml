name: wakawaka
description: "YouTube Audio Player — stream audio from YouTube with playlist management."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # YouTube extraction
  youtube_explode_dart: ^2.3.4
  # Audio playback
  media_kit: ^1.1.11
  media_kit_libs_audio: ^1.0.5
  # State management
  provider: ^6.1.2
  # Persistent storage
  shared_preferences: ^2.3.2
  # HTTP client
  dio: ^5.7.0
  # Thumbnails
  cached_network_image: ^3.4.1
  # Permissions
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
